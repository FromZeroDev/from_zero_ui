name: fz_ui_utility
description: Misc UI utility widgets for FromZero UI.
publish_to: 'none'
version: 0.1.0
environment:
  sdk: "^3.9.0"
dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: 2.0.0-dev.9
  animations: ^2.0.11
  bitsdojo_window: ^0.1.6
  bitsdojo_window_platform_interface: ^0.1.2
  dartx: ^1.2.0
  path_provider: ^2.1.0

  fz_animations:
    path: ../fz_animations
  fz_tooltip:
    path: ../fz_tooltip
  fz_dialog:
    path: ../fz_dialog
  fz_future_handling:
    path: ../fz_future_handling
  fz_localizations:
    path: ../fz_localizations
  fz_logo:
    path: ../fz_logo
  fz_scaffold:
    path: ../fz_scaffold
  fz_scrollbar:
    path: ../fz_scrollbar
  fz_simple_shadow:
    path: ../fz_simple_shadow
  fz_translucent_ink_well:
    path: ../fz_translucent_ink_well
  fz_value_string:
    path: ../fz_value_string

  fz_platform:
    path: ../fz_platform
dependency_overrides:
  intl: ^0.20.2
  archive: ^4.0.7

dev_dependencies:
  flutter_lints: ^5.0.0
