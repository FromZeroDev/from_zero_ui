  fz_localizations:
    path: ../fz_localizations
  fz_platform:
    path: ../fz_platform
  fz_router:
    path: ../fz_router
  fz_scrollbar:
    path: ../fz_scrollbar
  fz_simple_shadow:
    path: ../fz_simple_shadow
  fz_snackbar:
    path: ../fz_snackbar
  fz_theme:
    path: ../fz_theme
  fz_ui_utility:
    path: ../fz_ui_utility


