name: fz_scaffold
description: Main scaffold and app content wrapper for FromZero UI.
publish_to: 'none'
version: 0.1.0
environment:
  sdk: "^3.9.0"
dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: 2.0.0-dev.9
  bitsdojo_window: ^0.1.6
  dartx: ^1.2.0
  dio: ^5.8.0+1
  go_router: 10.0.0
  hive: ^2.2.3
